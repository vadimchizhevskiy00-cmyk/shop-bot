<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 12px; }
        .sort-btn { padding: 10px; border: 1px solid #ccc; background: #f0f0f0; cursor: pointer; }
        #debug { color: red; font-size: 12px; }
    </style>
</head>
<body>
    <div id="debug"></div>
    <div id="product-view">
        <h2 id="cat-title"></h2>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="sort-btn" onclick="sortProducts('asc')">▲ Дешевші</button>
            <button class="sort-btn" onclick="sortProducts('desc')">▼ Дорожчі</button>
        </div>
        <div id="catalog"></div>
    </div>

    <script>
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];
        let currentCategory = 'Телефони'; // Временно для теста

        fetch(API_URL)
            .then(res => res.json())
            .then(data => { 
                allProducts = Array.isArray(data) ? data : data.лист1;
                document.getElementById('debug').innerText = "Завантажено товарів: " + allProducts.length;
                showCategory(currentCategory);
            })
            .catch(err => document.getElementById('debug').innerText = "Помилка API: " + err);

        function showCategory(cat) {
            currentCategory = cat;
            const filtered = allProducts.filter(p => p.category && p.category.trim() === cat);
            renderProducts(filtered);
        }

        function renderProducts(products, sortType = 'default') {
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            let sorted = [...products];
            if (sortType === 'asc') sorted.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
            if (sortType === 'desc') sorted.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
            
            sorted.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `<h3>${p.name}</h3><p>Ціна: <b>${p.price}</b></p>`;
                container.appendChild(div);
            });
        }
        
        function sortProducts(type) {
            const filtered = allProducts.filter(p => p.category && p.category.trim() === currentCategory);
            renderProducts(filtered, type);
        }
    </script>
</body>
</html>
