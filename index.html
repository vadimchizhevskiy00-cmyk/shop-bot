<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
    /* Устанавливаем базовый размер шрифта для всех устройств */
    body { 
        font-family: sans-serif; 
        font-size: 16px; /* Это стандарт для чтения на телефонах */
        margin: 0; 
        padding: 10px; 
    }
    
    #catalog { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 15px; 
    }

    .product { 
        border: 1px solid #ddd; 
        padding: 15px; 
        border-radius: 12px; 
        background: #f9f9f9;
    }

    button { 
        padding: 12px 20px; 
        font-size: 16px; /* Кнопки должны быть удобно нажимаемыми пальцем */
        cursor: pointer;
        background: #2481cc;
        color: white;
        border: none;
        border-radius: 8px;
        width: 100%; /* На телефоне кнопка растянется на всю ширину карточки */
    }
    </style>
</head>
<body>
    <div id="filters">
        <button class="filter-btn" onclick="filterCatalog('all')">Все</button>
        <button class="filter-btn" onclick="filterCatalog('phones')">Телефоны</button>
        <button class="filter-btn" onclick="filterCatalog('audio')">Аудио</button>
    </div>
    <div id="catalog"></div>

    <script>
        const products = [
            { id: 1, name: "iPhone 15", category: "phones", price: "900$" },
            { id: 2, name: "AirPods", category: "audio", price: "200$" },
            { id: 3, name: "Samsung S24", category: "phones", price: "850$" }
        ];

        function filterCatalog(cat) {
            let filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            let container = document.getElementById('catalog');
            container.innerHTML = '';
            filtered.forEach(p => {
                container.innerHTML += `<div class="product"><h3>${p.name}</h3><p>${p.price}</p>
                <button onclick="Telegram.WebApp.sendData('${p.name}')">Купить</button></div>`;
            });
        }
        
        // Показываем всё при загрузке
        filterCatalog('all');
        Telegram.WebApp.ready();
    </script>
</body>
</html>
