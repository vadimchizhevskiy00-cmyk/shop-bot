<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff; }
        .product { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        button { width: 100%; padding: 12px; background: #2481cc; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="catalog">Загрузка товаров...</div>

    <script>
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';

        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                // Предполагаем, что название листа в Sheety - это "лист1"
                const products = data.лист1; 
                const container = document.getElementById('catalog');
                container.innerHTML = '';
                
                products.forEach(p => {
                    container.innerHTML += `
                        <div class="product">
                            <h3>${p.name}</h3>
                            <p>Категория: ${p.category}</p>
                            <p>Цена: ${p.price}</p>
                            <button onclick="Telegram.WebApp.sendData('${p.name} - ${p.price}')">Заказать</button>
                        </div>`;
                });
            })
            .catch(err => {
                document.getElementById('catalog').innerHTML = 'Ошибка загрузки: ' + err;
            });

        Telegram.WebApp.ready();
    </script>
</body>
</html>
