<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg-color: #ffffff; --tg-theme-button-color: #2481cc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: var(--tg-bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 30px; font-size: 28px; text-align: center; }
        h2 { text-align: center; }
        .category-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; }
        .cat-btn { display: flex; align-items: center; padding: 15px 10px; /* Уменьшили горизонтальные отступы */border: none; border-radius: 16px; background: #f8f8f8; font-size: 16px; font-weight: 600; cursor: pointer; color: #333; transition: background 0.2s; width: 100%; justify-content: center;white-space: normal; /* Разрешаем перенос текста на новую строку */word-wrap: break-word; /* Переносим длинные слова */line-height: 1.2; /* Уменьшаем межстрочный интервал */}
        .cat-btn:active { background: #eee; }
        .product { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 400px; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn-main { width: 100%; max-width: 400px; padding: 16px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 25px; }
        .back-nav { background: none; border: none; color: #2481cc; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="category-view" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1>Каталог</h1>
        <div class="category-grid">
            <button class="cat-btn" onclick="showBrands()">📱 Телефони</button>
            <button class="cat-btn" onclick="showCategory('Планшети', true)">💻 Планшети</button>
            <button class="cat-btn" onclick="showCategory('Аксесуари', true)">🎧 Аксесуари</button>
            <button class="cat-btn" onclick="showInfo()" style="background:#eef;">📍 Контакти та адреса</button>
        </div>
    </div>

    <div id="brand-view" style="display:none; width: 100%; align-items: center; flex-direction: column;">
        <button class="back-nav" onclick="showMain()">← Назад</button>
        <h2>Оберіть бренд</h2>
        <div class="category-grid">
            <button class="cat-btn" onclick="showCategory('Samsung', false)">Samsung</button>
            <button class="cat-btn" onclick="showCategory('Redmi', false)">Redmi</button>
            <button class="cat-btn" onclick="showCategory('Xiaomi', false)">Xiaomi</button>
            <button class="cat-btn" onclick="showCategory('Apple', false)">Apple</button>
        </div>
    </div>

    <div id="product-view" style="display:none; width: 100%; align-items: center; flex-direction: column;">
        <button class="back-nav" onclick="backToPrevious()">← Назад</button>
        <h2 id="cat-title"></h2>
        <div id="catalog" style="width: 100%; max-width: 400px;"></div>
    </div>

    <div id="modal">
        <button class="back-nav" onclick="closeModal()">← Назад</button>
        <div id="modal-content"></div>
    </div>

    <script>
        Telegram.WebApp.expand();
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];

        fetch(API_URL).then(res => res.json()).then(data => { allProducts = Array.isArray(data) ? data : data.лист1; });

        function showBrands() { document.getElementById('category-view').style.display = 'none'; document.getElementById('brand-view').style.display = 'flex'; }
        function showMain() { document.getElementById('brand-view').style.display = 'none'; document.getElementById('category-view').style.display = 'flex'; }

        function showCategory(cat, isFromMain) {
            window.fromMain = isFromMain;
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('brand-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'flex';
            document.getElementById('cat-title').innerText = cat;

            const container = document.getElementById('catalog');
            container.innerHTML = '';

            // Если это Аксессуары, сначала ищем уникальные подкатегории
            if (cat === 'Аксесуари') {
                const subcats = [...new Set(allProducts.filter(p => p.category === 'Аксесуари').map(p => p.subcategory))];
                subcats.forEach(sub => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn';
                    btn.innerText = sub;
                    btn.onclick = () => renderProductsBySubcat(sub);
                    container.appendChild(btn);
                });
            } else {
                // Для телефонов и планшетов просто выводим список
                renderProducts(allProducts.filter(p => p.category && p.category.trim() === cat));
            }
        }

        // Функция вывода товаров после выбора подкатегории
        function renderProductsBySubcat(sub) {
            const container = document.getElementById('catalog');
            container.innerHTML = `<button class="back-nav" onclick="showCategory('Аксесуари', true)">← Назад</button>`;
            renderProducts(allProducts.filter(p => p.subcategory === sub));
        }

        // Универсальная функция отрисовки списка товаров
        function renderProducts(list) {
            const container = document.getElementById('catalog');
            list.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `<h3>${p.name}</h3><p>Ціна: ${p.price || '...'}</p>`;
                div.onclick = () => openProduct(p);
                container.appendChild(div);
            });
        }

        function backToPrevious() {
            document.getElementById('product-view').style.display = 'none';
            if (window.fromMain) document.getElementById('category-view').style.display = 'flex';
            else document.getElementById('brand-view').style.display = 'flex';
        }

        function openProduct(p) {
            const content = document.getElementById('modal-content');
            
            // Определяем, является ли товар аксессуаром (простая проверка)
            const isAccessory = p.category && p.category.trim() === 'Аксесуари';

            // Собираем варианты памяти только если это НЕ аксессуар
            let variants = [];
            if (!isAccessory) {
                variants = [
                    { label: '64 ГБ', price: p.price64 },
                    { label: '128 ГБ', price: p.price128 },
                    { label: '256 ГБ', price: p.price256 },
                    { label: '512 ГБ', price: p.price512 }
                ].filter(v => v.price && v.price !== "");
            }

            let buttonsHtml = '';
            // Если аксессуар, сразу берем цену из поля p.price
            let displayPrice = isAccessory ? (p.price || "Ціна не вказана") : "Оберіть об'єм пам'яті";
            
            if (variants.length > 0) {
                buttonsHtml = `<p>Оберіть об'єм пам'яті:</p><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">`;
                variants.forEach(v => {
                    buttonsHtml += `<button class="cat-btn" style="padding:10px; font-size:14px;" onclick="updatePrice('${v.price}', '${v.label}', '${p.name}')">${v.label}</button>`;
                });
                buttonsHtml += `</div>`;
            }

            // Блок описания и характеристик
            const description = p.description ? `<div style="margin-top:15px; font-style:italic;"><p><b>Опис:</b><br>${p.description}</p></div>` : '';
            const specs = p.specs ? `<div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-top:10px;"><p><b>Характеристики:</b><br>${p.specs.replace(/;/g, '<br>')}</p></div>` : '';

            // Если аксессуар - кнопка "Замовити" видна сразу
            const btnDisplay = isAccessory ? 'block' : 'none';
            const btnText = isAccessory ? `Замовити за ${p.price}` : 'Замовити';

            content.innerHTML = `<h2>${p.name}</h2>
                <p style="font-size:20px; text-align:center;">Ціна: <b id="current-price" style="color: ${isAccessory ? '#333' : '#2481cc'};">${displayPrice}</b></p>
                ${buttonsHtml}
                ${description}
                ${specs}
                <button class="btn-main" id="order-btn" style="display:${btnDisplay};" onclick="Telegram.WebApp.sendData('${p.name} - ${displayPrice}')">${btnText}</button>`;
            
            document.getElementById('modal').style.display = 'block';
        }

        function updatePrice(price, memory, name) {
            const priceEl = document.getElementById('current-price');
            priceEl.innerText = price;
            priceEl.style.color = "#333";
            const orderBtn = document.getElementById('order-btn');
            orderBtn.style.display = 'block';
            orderBtn.innerText = `Замовити за ${price}`;
            orderBtn.onclick = () => Telegram.WebApp.sendData(`${name} (${memory}) - ${price}`);
        }

        function showInfo() {
            const content = document.getElementById('modal-content');
            content.innerHTML = `<h2 style="margin-bottom:20px;">📍 Контакти</h2>
                <div style="line-height:1.6; text-align:center;">
                    <p>Ми знаходимось за адресою:<br><b>м. Чугуїв, Центральний бульвар, 8</b></p>
                    <p>Графік роботи:<br>Пн-Пт: 08:00 - 18:00<br>Сб-Нд: 08:00 - 17:00</p>
                    <p>Телефони підтримки:<br><a href="tel:+380XXXXXXXXX">+380973916400</a><br><a href="tel:+380YYYYYYYYY">+380631891683</a></p>
                </div>
                <button class="btn-main" onclick="closeModal()">Зрозуміло</button>`;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
