<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg-color: #ffffff; --tg-theme-button-color: #2481cc; }
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-bg-color); margin: 0; }
        h1, h2 { text-align: center; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-btn { padding: 25px 10px; border: none; border-radius: 16px; background: #f0f0f0; font-weight: bold; cursor: pointer; }
        .product { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .back-btn { width: 100%; padding: 12px; margin-bottom: 20px; background: #eee; border: none; border-radius: 12px; font-weight: bold; }
        button { width: 100%; padding: 14px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="category-view">
        <h1>Каталог</h1>
        <div class="category-grid">
            <button class="cat-btn" onclick="showCategory('Телефони')">📱 Телефони</button>
            <button class="cat-btn" onclick="showCategory('Планшети')">タブ Планшети</button>
            <button class="cat-btn" onclick="showCategory('Аксесуари')">🎧 Аксесуари</button>
        </div>
    </div>

    <div id="product-view" style="display:none;">
        <button class="back-btn" onclick="showMain()">← Назад</button>
        <h2 id="cat-title"></h2>
        <div id="catalog"></div>
    </div>

    <script>
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];

        fetch(API_URL)
            .then(res => res.json())
            .then(data => { 
                allProducts = Array.isArray(data) ? data : data.лист1; 
            });

        function showCategory(category) {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('cat-title').innerText = category;
            
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            // Фильтрация теперь сравнивает строго с тем, что вы написали
            const filtered = allProducts.filter(p => p.category && p.category.trim() === category);
            
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Поки що пусто.</p>';
            } else {
                filtered.forEach(p => {
                    container.innerHTML += `
                        <div class="product">
                            <h3>${p.name}</h3>
                            <p>Цiна: ${p.price}</p>
                            <button onclick="Telegram.WebApp.sendData('${p.name} - ${p.price}')">Замовити</button>
                        </div>`;
                });
            }
        }

        function showMain() {
            document.getElementById('product-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
        }
        
        Telegram.WebApp.ready();
    </script>
</body>
</html>
