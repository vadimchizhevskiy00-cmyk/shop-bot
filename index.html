<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg-color: #ffffff; --tg-theme-button-color: #2481cc; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: var(--tg-bg-color); margin: 0; }
        h1, h2 { text-align: center; }
        .category-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 25px; }
        .cat-btn { padding: 22px; border: none; border-radius: 16px; background: #f4f4f4; font-weight: 600; cursor: pointer; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: transform 0.1s; }
        .cat-btn:active { transform: scale(0.98); }
        .product { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 16px; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn-main { width: 100%; padding: 16px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 25px; }
        .back-nav { background: none; border: none; color: #2481cc; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: 500; }
        .specs-box { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="category-view">
        <h1>Каталог</h1>
        <div class="category-grid">
            <button class="cat-btn" onclick="showBrands()">📱 Телефони</button>
            <button class="cat-btn" onclick="showCategory('Планшети', true)">タブ Планшети</button>
            <button class="cat-btn" onclick="showCategory('Аксесуари', true)">🎧 Аксесуари</button>
            <button class="cat-btn" onclick="showInfo()" style="background:#eef;">📍 Контакти та адреса</button>
        </div>
    </div>

    <div id="brand-view" style="display:none;">
        <button class="back-nav" onclick="showMain()">← Назад</button>
        <h2>Оберіть бренд</h2>
        <div class="category-grid">
            <button class="cat-btn" onclick="showCategory('Samsung', false)">Samsung</button>
            <button class="cat-btn" onclick="showCategory('Redmi', false)">Redmi</button>
            <button class="cat-btn" onclick="showCategory('Xiaomi', false)">Xiaomi</button>
            <button class="cat-btn" onclick="showCategory('Apple', false)">Apple</button>
        </div>
    </div>

    <div id="product-view" style="display:none;">
        <button class="back-nav" onclick="backToPrevious()">← Назад</button>
        <h2 id="cat-title"></h2>
        <div id="catalog"></div>
    </div>

    <div id="modal">
        <button class="back-nav" onclick="closeModal()">← Назад</button>
        <div id="modal-content"></div>
    </div>

    <script>
        Telegram.WebApp.expand();
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];

        fetch(API_URL).then(res => res.json()).then(data => { allProducts = Array.isArray(data) ? data : data.лист1; });

        function showBrands() {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('brand-view').style.display = 'block';
        }

        function showMain() {
            document.getElementById('brand-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
        }

        function showCategory(cat, isFromMain) {
            window.fromMain = isFromMain;
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('brand-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('cat-title').innerText = cat;
            
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            allProducts.filter(p => p.category && p.category.trim() === cat).forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `<h3>${p.name}</h3><p>Ціна: <b>${p.price}</b></p>`;
                div.onclick = () => openProduct(p);
                container.appendChild(div);
            });
        }

        function backToPrevious() {
            document.getElementById('product-view').style.display = 'none';
            if (window.fromMain) {
                document.getElementById('category-view').style.display = 'block';
            } else {
                document.getElementById('brand-view').style.display = 'block';
            }
        }

        function showInfo() {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 style="margin-bottom: 20px;">📍 Контакти</h2>
                <div style="line-height: 1.6; text-align: center;">
                    <p>Ми знаходимось за адресою:<br><b>м. Чугуїв, Центральний бульвар, 8</b></p>
                    <p>Графік роботи:<br>Пн-Пт: 08:00 - 18:00<br>Сб-Нд: 08:00 - 17:00</p>
                    <p>Телефони підтримки:<br>
                    <a href="tel:+380XXXXXXXXX" style="color: #2481cc; font-weight: bold; text-decoration: none;">+380 (97) 391-64-00</a><br>
                    <a href="tel:+380YYYYYYYYY" style="color: #2481cc; font-weight: bold; text-decoration: none;">+380 (63) 189-16-83</a></p>
                </div>
                <button class="btn-main" onclick="closeModal()">Зрозуміло</button>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function openProduct(p) {
            const content = document.getElementById('modal-content');
            let specs = p.specs ? p.specs.replace(/\n/g, ';').split(';').map(i => `• ${i.trim()}`).filter(i => i !== '•').join('<br>') : '';
            content.innerHTML = `
                ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:16px;">` : ''}
                <h2>${p.name}</h2>
                <p style="font-style: italic;">${p.description || ''}</p>
                ${specs ? `<h4>Характеристики:</h4><div class="specs-box">${specs}</div>` : ''}
                <p style="margin-top:20px;"><b>Ціна: ${p.price}</b></p>
            `;
            const btn = document.createElement('button');
            btn.className = 'btn-main';
            btn.innerText = 'Замовити';
            btn.onclick = () => Telegram.WebApp.sendData(`${p.name} - ${p.price}`);
            content.appendChild(btn);
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
