<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg-color: #ffffff; --tg-theme-button-color: #2481cc; }
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: var(--tg-bg-color); margin: 0; }
        h1 { text-align: center; }
        .category-grid { display: grid; gap: 15px; margin-top: 20px; }
        .cat-btn { padding: 20px; border: none; border-radius: 16px; background: #f8f8f8; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .product { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 16px; cursor: pointer; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-img { width: 100%; border-radius: 16px; margin-bottom: 20px; }
        .modal-description { white-space: pre-wrap; line-height: 1.5; color: #444; }
        .btn-main { width: 100%; padding: 15px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; }
        .back-nav { background: none; border: none; color: #2481cc; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="category-view">
        <h1>Каталог</h1>
        <div class="category-grid">
            <button class="cat-btn" onclick="showCategory('Телефони')">📱 Телефони <span>→</span></button>
            <button class="cat-btn" onclick="showCategory('Планшети')">タブ Планшети <span>→</span></button>
            <button class="cat-btn" onclick="showCategory('Аксесуари')">🎧 Аксесуари <span>→</span></button>
        </div>
    </div>

    <div id="product-view" style="display:none;">
        <button class="back-nav" onclick="showMain()">← Назад</button>
        <h2 id="cat-title"></h2>
        <div id="catalog"></div>
    </div>

    <div id="modal">
        <button class="back-nav" onclick="closeModal()">← Назад</button>
        <div id="modal-content"></div>
    </div>

    <script>
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];

        fetch(API_URL).then(res => res.json()).then(data => { 
            allProducts = Array.isArray(data) ? data : data.лист1; 
        });

        function showCategory(cat) {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('cat-title').innerText = cat;
            
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            allProducts.forEach((p, index) => {
                if (p.category && p.category.trim() === cat) {
                    container.innerHTML += `
                        <div class="product" onclick="openModal(${index})">
                            <h3>${p.name}</h3>
                            <p>Ціна: <b>${p.price}</b></p>
                        </div>`;
                }
            });
        }

        function openModal(index) {
            const p = allProducts[index];
            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            document.getElementById('modal-content').innerHTML = `
                ${p.image ? `<img src="${p.image}" class="modal-img">` : ''}
                <h2>${p.name}</h2>
                <p class="modal-description">${p.description || 'Опису поки немає.'}</p>
                <p><b>Ціна: ${p.price}</b></p>
                <button class="btn-main" onclick="order('${p.name.replace(/'/g, "\\'")}', '${p.price}')">Замовити</button>
            `;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showMain() { document.getElementById('product-view').style.display = 'none'; document.getElementById('category-view').style.display = 'block'; }
        function order(name, price) { Telegram.WebApp.sendData(name + ' - ' + price); }
        
        Telegram.WebApp.ready();
    </script>
</body>
</html>
