<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg-color: #ffffff; --tg-theme-button-color: #2481cc; }
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-bg-color); margin: 0; }
        h1 { text-align: center; }
        
        /* Каталог в одну колонку */
        .category-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .cat-btn { padding: 20px; border: none; border-radius: 16px; background: #f8f8f8; font-weight: bold; cursor: pointer; text-align: left; }
        
        .product { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 16px; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn-main { width: 100%; padding: 15px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; }
        .back-nav { background: none; border: none; color: #2481cc; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .specs-box { background: #f4f4f4; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="category-view">
        <h1>Каталог</h1>
        <div class="category-grid">
            <button class="cat-btn" onclick="showCategory('Телефони')">📱 Телефони</button>
            <button class="cat-btn" onclick="showCategory('Планшети')">タブ Планшети</button>
            <button class="cat-btn" onclick="showCategory('Аксесуари')">🎧 Аксесуари</button>
        </div>
    </div>

    <div id="product-view" style="display:none;">
        <button class="back-nav" onclick="showMain()">← Назад</button>
        <h2 id="cat-title"></h2>
        <div id="catalog"></div>
    </div>

    <div id="modal">
        <button class="back-nav" onclick="closeModal()">← Назад</button>
        <div id="modal-content"></div>
    </div>

    <script>
        const API_URL = 'https://api.sheety.co/a9dd7b52784ce73cfff44eb4e535efce/shop/лист1';
        let allProducts = [];

        fetch(API_URL).then(res => res.json()).then(data => { 
            allProducts = Array.isArray(data) ? data : data.лист1; 
        });

        function showCategory(cat) {
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('cat-title').innerText = cat;
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            allProducts.forEach((p, index) => {
                if (p.category && p.category.trim() === cat) {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `<h3>${p.name}</h3><p>Ціна: ${p.price}</p>`;
                    div.onclick = () => openModal(index);
                    container.appendChild(div);
                }
            });
        }

        function openModal(index) {
            const p = allProducts[index];
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            // Превращаем строку характеристик в список с новой строки
            let formattedSpecs = '';
            if (p.specs) {
                formattedSpecs = p.specs.split(';').map(item => item.trim()).filter(item => item).join('<br>');
            }
            
            content.innerHTML = `
                ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:16px;">` : ''}
                <h2>${p.name}</h2>
                <p style="font-style: italic;">${p.description || ''}</p>
                ${formattedSpecs ? `<h4>Характеристики:</h4><div class="specs-box">${formattedSpecs}</div>` : ''}
                <p style="margin-top:20px;"><b>Ціна: ${p.price}</b></p>
            `;
            
            const btn = document.createElement('button');
            btn.className = 'btn-main';
            btn.innerText = 'Замовити';
            btn.onclick = () => Telegram.WebApp.sendData(`${p.name} - ${p.price}`);
            content.appendChild(btn);
            
            modal.style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showMain() { document.getElementById('product-view').style.display = 'none'; document.getElementById('category-view').style.display = 'block'; }
        
        Telegram.WebApp.ready();
    </script>
</body>
</html>
